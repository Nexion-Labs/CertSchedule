# Copy this to secret.yaml, fill in real values, and apply it — do not commit
# the filled-in version. Generate strong values with e.g.:
#   openssl rand -hex 32 | cut -c1-32   # ENCRYPTION_KEY (must be exactly 32 bytes)
#   openssl rand -base64 48             # JWT_SECRET
apiVersion: v1
kind: Secret
metadata:
  name: certschedule-secrets
  namespace: certschedule
type: Opaque
stringData:
  JWT_SECRET: "replace-with-a-long-random-string"
  ENCRYPTION_KEY: "replace-with-exactly-32-bytes!!"
  ADMIN_USERNAME: "admin"
  ADMIN_PASSWORD: "replace-with-a-strong-password"
