apiVersion: v1
kind: Namespace
metadata:
  name: certschedule
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: certschedule
  namespace: certschedule
spec:
  # SQLite is single-writer; do not scale this beyond 1 replica.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: certschedule
  template:
    metadata:
      labels:
        app: certschedule
    spec:
      serviceAccountName: certschedule
      containers:
        - name: certschedule
          image: certschedule:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: certschedule-secrets
          env:
            - name: CERTBOT_STAGING
              value: "false"
            - name: SCHEDULER_INTERVAL
              value: "12h"
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: certschedule-data
